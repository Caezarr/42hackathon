name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          version: "0.10.9"
      - run: uv sync --frozen --extra dev
      - run: uv run ruff check src tests
      - run: uv run pytest
      - run: uv build
      - run: docker compose config --quiet
      - run: docker build --tag fredo:test .
